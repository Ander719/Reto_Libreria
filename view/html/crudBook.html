<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros</title>
    <link rel="icon" type="image/png" href="../assets/img/Book&Bugs_Logo.png">
    <link rel="stylesheet" href="../assets/css/crudBook.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <script type="module" src="../assets/js/crudBook.js"></script>
</head>

<body style="display: none;">
    <header class="main-header">
        <nav class="nav-container">
            <a href="main.html" class="logo-link">
                <img src="../assets/img/Book&Bugs_Logo.png" alt="Logo" class="logo">
            </a>
            <div class="welcome-text">Gestión de Inventario</div>
            <ul class="nav-menu">
                <li><a href="main.html" class="nav-link">Inicio</a></li>
                <li><a href="bookOptions.html" class="nav-link">Volver</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <h1 id="pageTitle" class="page-title">Gestión de Libros</h1>

        <section id="searchSection" class="search-section">
            <label for="searchIsbn">Buscar Libro a Editar:</label>
            <div class="search-group">
                <select id="searchIsbn" class="search-select">
                    <option value="">Cargando libros...</option>
                </select>
                <button id="btnSearch" class="btn-search">Cargar Datos</button>
            </div>
            <p id="searchMessage" class="search-msg"></p>
        </section>

        <section class="form-section">
            <form id="bookForm" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="isbn">ISBN (13 dígitos)</label>
                        <input type="text" id="isbn" name="isbn" required placeholder="978..." maxlength="13">
                    </div>
                    
                    <div class="input-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" name="title" required>
                    </div>

                    <div class="input-group">
                        <label for="authorName">Nombre Autor</label>
                        <input type="text" id="authorName" name="authorName" required>
                    </div>

                    <div class="input-group">
                        <label for="authorSurname">Apellido Autor</label>
                        <input type="text" id="authorSurname" name="authorSurname" required>
                    </div>

                    <div class="input-group">
                        <label for="editorial">Editorial</label>
                        <input type="text" id="editorial" name="editorial" required>
                    </div>

                    <div class="input-group small">
                        <label for="pages">Páginas</label>
                        <input type="number" id="pages" name="pages" required>
                    </div>

                    <div class="input-group small">
                        <label for="stock">Stock</label>
                        <input type="number" id="stock" name="stock" required>
                    </div>

                    <div class="input-group small">
                        <label for="price">Precio (€)</label>
                        <input type="number" step="0.01" id="price" name="price" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="synopsis">Sinopsis</label>
                        <textarea id="synopsis" name="synopsis" rows="4" required></textarea>
                    </div>

                    <div class="input-group full-width">
                        <label>Portada del Libro</label>
                        <div class="drop-zone" id="dropZone">
                            <span class="drop-zone__prompt">Arrastra la imagen aquí o haz clic para subir</span>
                            <input type="file" name="coverFile" id="coverInput" class="drop-zone__input" accept="image/*">
                        </div>
                        <input type="hidden" id="cover" name="cover">
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" id="actionBtn" class="action-btn">Guardar</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2025 Book & Bugs - Panel de Administración</p>
    </footer>
</body>
</html>
