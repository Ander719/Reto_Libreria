<!DOCTYPE html>
<html lang="en">

<head class="headHome">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Store Catalog</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="../assets/js/store.js" defer></script>

</head>

<body>
    <header class="headHome">
        <div class="logo-container">
            <img src="../assets/img/Nike logo for some reason.png" alt="Store Logo" class="topPic" />
        </div>

        <div class="search-bar-container">
            <input type="text" id="searchInput" placeholder="Search by title, author or ISBN..." />
            <button id="searchBtn" class="search-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                </svg>
            </button>
        </div>

        <div class="nav-icons">
            <a href="cart.html" class="cartIcon" aria-label="Go to Cart">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" width="30" height="30">
                    <path
                        d="M2.25 2.25a.75.75 0 0 0 0 1.5h1.386c.17 0 .318.114.362.278l2.558 9.592a3.752 3.752 0 0 0-2.806 3.63c0 .414.336.75.75.75h15.75a.75.75 0 0 0 0-1.5H5.378A2.25 2.25 0 0 1 7.5 15h11.218a.75.75 0 0 0 .674-.421 60.358 60.358 0 0 0 2.96-7.228.75.75 0 0 0-.525-.965A60.864 60.864 0 0 0 5.68 4.509l-.232-.867A1.875 1.875 0 0 0 3.636 2.25H2.25ZM3.75 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0ZM16.5 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" />
                </svg>
                <span id="cartCount" class="cart-badge">0</span>
            </a>

            <a href="login.html" class="logoutIcon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black">
                    <path fill-rule="evenodd"
                        d="M16.5 3.75a1.5 1.5 0 0 1 1.5 1.5v13.5a1.5 1.5 0 0 1-1.5 1.5h-6a1.5 1.5 0 0 1-1.5-1.5V15a.75.75 0 0 0-1.5 0v3.75a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V5.25a3 3 0 0 0-3-3h-6a3 3 0 0 0-3 3V9A.75.75 0 1 0 9 9V5.25a1.5 1.5 0 0 1 1.5-1.5h6ZM5.78 8.47a.75.75 0 0 0-1.06 0l-3 3a.75.75 0 0 0 0 1.06l3 3a.75.75 0 0 0 1.06-1.06l-1.72-1.72H15a.75.75 0 0 0 0-1.5H4.06l1.72-1.72a.75.75 0 0 0 0-1.06Z"
                        clip-rule="evenodd" />
                </svg>
            </a>
        </div>
    </header>

    <main class="store-container">
        <aside class="filters-panel">
            <h3>Filters</h3>
            <form id="filterForm">
                <div class="filter-group">
                    <label for="priceRange">Max Price: <span id="priceValue">50€</span></label>
                    <input type="range" id="priceRange" name="price" min="0" max="100" step="1"
                        oninput="document.getElementById('priceValue').innerText = this.value + '€'">
                </div>

                <div class="filter-group">
                    <h4>Authors</h4>
                    <div class="checkbox-list">
                        <label><input type="checkbox" name="author" value="1"> Brandon Sanderson</label>
                        <label><input type="checkbox" name="author" value="2"> J.K. Rowling</label>
                    </div>
                </div>

                <button type="button" id="applyFiltersBtn" class="adjustData">Apply Filters</button>
            </form>
        </aside>

        <section class="products-area">
            <div class="header-products">
                <h2>Best Sellers</h2>
                <select id="sortSelect" class="sort-dropdown">
                    <option value="relevance">Sort by: Relevance</option>
                    <option value="price_asc">Price: Low to High</option>
                    <option value="price_desc">Price: High to Low</option>
                </select>
            </div>

            <div id="bookGrid" class="book-grid">

                <article class="book-card">
                    <div class="book-image">
                        <img src="https://placehold.co/200x300" alt="Book Cover">
                    </div>
                    <div class="book-info">
                        <h4 class="book-title">The Way of Kings</h4>
                        <p class="book-author">Brandon Sanderson</p>
                        <div class="price-action">
                            <span class="book-price">25.99€</span>
                            <button class="add-to-cart-btn" data-isbn="978-0765326355">
                                Add +
                            </button>
                        </div>
                        <a href="bookDetails.html?isbn=978-0765326355" class="details-link">View Details</a>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p class="copyright">© 2025 [Your Name]. All rights reserved.</p>
    </footer>
</body>

</html>
