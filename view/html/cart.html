<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="../assets/js/cart.js" defer></script>

</head>

<body>

    <header class="headHome">
        <div class="logo-container">
            <a href="store.html"><img src="../assets/img/Nike logo for some reason.png" alt="Logo" class="topPic" /></a>
        </div>
        <div class="nav-icons">
            <a href="login.html" class="logoutIcon">Log Out</a>
        </div>
    </header>

    <main class="cart-container">
        <h1>Your Shopping Cart</h1>

        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cartItemsContainer">
            </tbody>
        </table>

        <div class="cart-summary">
            <p>Subtotal: <span id="cartSubtotal">0.00€</span></p>
            <p>Tax (4%): <span id="cartTax">0.00€</span></p>
            <hr>
            <h3>Total: <span id="cartTotal" style="color: var(--success-color);">0.00€</span></h3>

            <button id="checkoutBtn" class="checkout-btn">Checkout</button>
            <a href="store.html" style="display:block; margin-top:10px; text-align:center; font-size:0.9rem;">Continue
                Shopping</a>
        </div>
    </main>

    <footer>
        <p class="copyright">© 2025 MyBookStore. All rights reserved.</p>
    </footer>
</body>

</html>
