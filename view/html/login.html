<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyWebsite Login</title>
  <link rel="stylesheet" href="../assets/css/loginSingUp.css" />
  <script type="module" src="../assets/js/login.js"></script>
</head>

<body>
  <main class="container">
    <aside class="leftPanel">
      <img src="../assets/img/mountainVertical.jpg" alt="Imagen de fondo" />
    </aside>
    <section class="rightPanel">
      <form id="loginForm" class="loginForm">
        <h2>Welcome back!</h2>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Username" required />
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Log In</button>

        <p class="registerLink">
          Don't have an account? <a href="singup.html">Register now</a>
        </p>
      </form>
    </section>
    <dialog id="statusDialog" closedBy="any">
      <div class="dialog-content">
        <span id="dialogMessage"></span>
        <form method="dialog">
          <button class="btn btn-secondary">OK</button>
        </form>
      </div>
    </dialog>
  </main>
</body>

</html>
